_schema-version: '3.1'
ID: sap-project-mgmt
version: 1.0.0
description: SAP Project Management Application

parameters:
  enable-parallel-deployments: true

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production

modules:
  # ─── CAP Backend Service ────────────────────────────
  - name: sap-pm-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
      disk-quota: 512M
    build-parameters:
      builder: npm
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: sap-pm-db
      - name: sap-pm-auth

  # ─── HANA Cloud Database Deployer ──────────────────
  - name: sap-pm-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
      disk-quota: 512M
    requires:
      - name: sap-pm-db

  # ─── App Router (Security Gateway) ─────────────────
  - name: sap-pm-approuter
    type: approuter.nodejs
    path: approuter
    parameters:
      memory: 128M
      disk-quota: 256M
    build-parameters:
      builder: npm
      requires:
        - name: sap-pm-webapp
          artifacts:
            - webapp/**
          target-path: webapp
    requires:
      - name: srv-api
        group: destinations
        properties:
          name: srv-api
          url: ~{srv-url}
          forwardAuthToken: true
      - name: sap-pm-auth

  # ─── React Frontend (Build Only) ───────────────────
  - name: sap-pm-webapp
    type: html5
    path: app
    build-parameters:
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms: []
      build-result: dist

resources:
  # ─── HANA Cloud HDI Container ──────────────────────
  - name: sap-pm-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared

  # ─── XSUAA Service ────────────────────────────────
  - name: sap-pm-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
