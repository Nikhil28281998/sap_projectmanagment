_schema-version: '3.1'
ID: sap-project-mgmt
version: 1.0.0
description: SAP Project Management Application

parameters:
  enable-parallel-deployments: true

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production

modules:
  # ─── CAP Backend Service ────────────────────────────
  - name: sap-pm-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
      disk-quota: 512M
    properties:
      APP_ENCRYPTION_KEY: sap-pm-enc-key-2026-bridgebio-change-me
      # AI_DESTINATION_NAME and AI_CORE_DEPLOYMENT_ID are read from AppConfig at runtime
      # (set by Admin in Settings → SAP AI Core Integration — no redeploy needed)
    build-parameters:
      builder: npm
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: sap-pm-db
      - name: sap-pm-auth
      - name: sap-pm-destination
      - name: sap-pm-connectivity

  # ─── HANA Cloud Database Deployer ──────────────────
  - name: sap-pm-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
      disk-quota: 512M
    requires:
      - name: sap-pm-db

  # ─── App Router (Security Gateway) ─────────────────
  - name: sap-pm-approuter
    type: approuter.nodejs
    path: approuter
    parameters:
      memory: 128M
      disk-quota: 256M
    build-parameters:
      builder: npm
      requires:
        - name: sap-pm-webapp
          artifacts:
            - webapp/**
          target-path: webapp
    requires:
      - name: srv-api
        group: destinations
        properties:
          name: srv-api
          url: ~{srv-url}
          forwardAuthToken: true
      - name: sap-pm-auth

  # ─── React Frontend (Build Only) ───────────────────
  - name: sap-pm-webapp
    type: html5
    path: frontend
    build-parameters:
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms: []
      build-result: ../approuter/webapp

resources:
  # ─── HANA Cloud HDI Container ──────────────────────
  - name: sap-pm-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared

  # ─── XSUAA Service ────────────────────────────────
  - name: sap-pm-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json

  # ─── BTP Destination Service (AI, RFC, SharePoint) ─
  - name: sap-pm-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
      config:
        version: 1.0.0
        HTML5Runtime_enabled: false
        init_data:
          instance:
            existing_destinations_policy: update
            destinations:
              # AI is provided via SAP AI Core using the "Ai_Core" BTP Destination
              # configured manually in BTP Cockpit with OAuth2ClientCredentials
              # from the AI Core service key. No additional destinations needed here.

  # ─── BTP Connectivity Service (Cloud Connector → SAP on-prem) ─
  - name: sap-pm-connectivity
    type: org.cloudfoundry.managed-service
    parameters:
      service: connectivity
      service-plan: lite
